<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification System</title>
    <style>
        /* CSS অংশ: ডিজাইনের জন্য */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f0f0; overflow: hidden;
        }

        /* ওপরের অংশ: যেখানে ব্যাকগ্রাউন্ড ছবি থাকবে */
        .top-section {
            background: url('background.jpg') no-repeat center center;
            background-size: cover;
            height: 82vh; /* স্ক্রিনের ৮২% জায়গা নেবে */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* সাদা সার্টিফিকেট কার্ড */
        .cert-card {
            background: rgba(255, 255, 255, 0.98);
            width: 100%;
            max-width: 420px;
            padding: 15px;
            border-radius: 12px;
            border-top: 8px solid #005a87;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
        }

        .header { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ddd; padding-bottom: 8px; margin-bottom: 12px; }
        .header img { width: 50px; }
        .header-text h3 { margin: 0; color: #005a87; font-size: 18px; }
        .header-text p { margin: 0; font-size: 11px; color: #777; }

        .user-photo img { 
            width: 120px; height: 140px; 
            border: 2px solid #005a87; 
            object-fit: cover; 
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .info-table { width: 100%; text-align: left; }
        .info-table p { 
            margin: 6px 0; font-size: 13px; color: #333; 
            border-bottom: 1px solid #eee; padding-bottom: 2px;
        }

        .stamp img { width: 75px; margin-top: 10px; }

        /* নিচের অংশ: যেখানে লোগো দৌড়াবে */
        .bottom-marquee {
            height: 18vh; /* স্ক্রিনের নিচের ১৮% জায়গা */
            background: white;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 2px solid #ccc;
        }

        .track {
            display: flex;
            width: calc(120px * 16);
            animation: move 20s linear infinite;
        }

        .track img { width: 85px; margin: 0 25px; height: auto; }

        @keyframes move {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-120px * 8)); }
        }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="cert-card">
            <div class="header">
                <img src="logo.png">
                <div class="header-text">
                    <h3>Knowledge Drag</h3>
                    <p>Safety and Industrial Trainings</p>
                </div>
            </div>

            <div class="user-photo">
                <img id="userPhoto" src="logo.png">
            </div>

            <div class="info-table">
                <p><strong>Name:</strong> <span id="name">...</span></p>
                <p><strong>Enrollment No:</strong> <span id="enrollNo">...</span></p>
                <p><strong>Course:</strong> <span id="course">...</span></p>
                <p><strong>Issue Date:</strong> <span id="issueDate">...</span></p>
                <p><strong>Expiry Date:</strong> <span id="expiryDate">...</span></p>
            </div>

            <div class="stamp">
                <img src="verified.png">
            </div>
        </div>
    </div>

    <div class="bottom-marquee">
        <div class="track">
            <img src="iso.png"> <img src="osha.png"> <img src="saso.png">
            <img src="sabic.png"> <img src="iosh.png"> <img src="tavtc.png">
            <img src="saac.png"> <img src="anci.png">
            <img src="iso.png"> <img src="osha.png"> <img src="saso.png">
            <img src="sabic.png"> <img src="iosh.png"> <img src="tavtc.png">
            <img src="saac.png"> <img src="anci.png">
        </div>
    </div>

    <script>
        // জাভাস্ক্রিপ্ট অংশ: তথ্য ম্যানেজ করার জন্য
        const students = {
            "121086": {
                name: "MD MAHIBULLAH",
                iqama: "258XXXXXXX",
                course: "SAFETY SPECIALIST / WPR",
                issue: "13-04-2026",
                expiry: "12-04-2027",
                photo: "mahibullah.jpg" 
            },
            "258-KD-SF-26": {
                name: "KAMRUL ISLAM",
                iqama: "2589913066",
                course: "SCAFFOLDING ERECTION AND DISMANTLING",
                issue: "01-02-2026",
                expiry: "31-01-2027",
                photo: "kamrul.jpg"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (id && students[id]) {
            document.getElementById('name').innerText = students[id].name;
            document.getElementById('enrollNo').innerText = id;
            document.getElementById('course').innerText = students[id].course;
            document.getElementById('issueDate').innerText = students[id].issue;
            document.getElementById('expiryDate').innerText = students[id].expiry;
            document.getElementById('userPhoto').src = students[id].photo;
        } else {
            document.body.innerHTML = "<h1 style='text-align:center; margin-top:100px;'>Invalid ID! Please check the link.</h1>";
        }
    </script>
</body>
</html>
