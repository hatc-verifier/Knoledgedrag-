<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification System</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; background: #f0f0f0; }
        
        /* সার্টিফিকেটের মূল কন্টেইনার */
        .certificate-container {
            position: relative;
            width: 100%;
            max-width: 800px; /* আপনার টেমপ্লেটের সাইজ অনুযায়ী কমবেশি করতে পারেন */
            aspect-ratio: 1.414 / 1; /* সার্টিফিকেটের স্ট্যান্ডার্ড অনুপাত */
            background-image: url('40799.png'); /* এখানে আপনার আপলোড করা ছবির নাম দিন */
            background-size: contain;
            background-repeat: no-repeat;
            margin-top: 20px;
        }

        /* ডাইনামিক তথ্যগুলোর পজিশনিং */
        .info { position: absolute; font-family: 'Arial', sans-serif; font-weight: bold; color: #000; }

        #user_photo {
            position: absolute;
            top: 25%; /* ওপর থেকে দূরত্ব (অ্যাডজাস্ট করুন) */
            left: 44%; /* বাম থেকে দূরত্ব */
            width: 100px;
            height: 120px;
            border: 2px solid #fff;
            object-fit: cover;
        }

        #name { top: 55%; left: 0; width: 100%; text-align: center; font-size: 24px; color: #005a87; }
        #enrollment { top: 48%; left: 44%; font-size: 14px; }
        #course { top: 65%; left: 10%; font-size: 16px; color: #005a87; max-width: 300px; }
        #expiry { top: 65%; right: 15%; font-size: 16px; }
        /* এভাবে আপনার ছবির ডিজাইন অনুযায়ী CSS দিয়ে পজিশন ঠিক করে নিতে হবে */

    </style>
</head>
<body>

<div class="certificate-container" id="cert-area">
    <img id="user_photo" src="" alt="">
    <div id="name" class="info"></div>
    <div id="enrollment" class="info"></div>
    <div id="course" class="info"></div>
    <div id="expiry" class="info"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            if(id && data[id]){
                const user = data[id];
                document.getElementById('name').innerText = user.name;
                document.getElementById('enrollment').innerText = id;
                document.getElementById('course').innerText = user.course;
                document.getElementById('expiry').innerText = user.expiry;
                document.getElementById('user_photo').src = user.photo;
            } else {
                document.body.innerHTML = "<h1>Data Not Found</h1>";
            }
        });
</script>

</body>
</html>
