<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Drag Verification</title>
    <style>
        /* ডিজাইন অংশ */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; overflow: hidden; }

        /* ওপরের ব্যাকগ্রাউন্ড অংশ */
        .top-bg {
            background: url('background.jpg') no-repeat center center;
            background-size: cover;
            height: 80vh; /* স্ক্রিনের ৮০% অংশ */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* কার্ডের ডিজাইন */
        .card {
            background: rgba(255, 255, 255, 0.98);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 10px;
            border-top: 8px solid #005a87;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .card-header { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; }
        .card-header img { width: 50px; }
        .header-text h3 { margin: 0; color: #005a87; font-size: 18px; }
        .header-text p { margin: 0; font-size: 10px; color: #666; }

        .user-photo img { width: 120px; height: 140px; border: 2px solid #005a87; object-fit: cover; margin-bottom: 10px; }

        .details { text-align: left; }
        .details p { margin: 6px 0; font-size: 13px; border-bottom: 1px solid #eee; padding-bottom: 2px; }

        .stamp img { width: 80px; margin-top: 10px; }

        /* নিচের সাদা অংশ যেখানে লোগো ঘুরবে */
        .bottom-white-bar {
            height: 20vh; /* স্ক্রিনের নিচের ২০% অংশ */
            background: white;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 2px solid #ddd;
        }

        .marquee {
            display: flex;
            width: 2000px;
            animation: scroll 20s linear infinite;
        }

        .marquee img { width: 80px; margin: 0 25px; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-1000px); }
        }
    </style>
</head>
<body>

    <div class="top-bg">
        <div class="card">
            <div class="card-header">
                <img src="logo.png">
                <div class="header-text">
                    <h3>Knowledge Drag</h3>
                    <p>Safety and Industrial Trainings</p>
                </div>
            </div>

            <div class="user-photo">
                <img id="userPhoto" src="logo.png">
            </div>

            <div class="details">
                <p><strong>Name:</strong> <span id="name">...</span></p>
                <p><strong>Enrollment No:</strong> <span id="enrollNo">...</span></p>
                <p><strong>Course:</strong> <span id="course">...</span></p>
                <p><strong>Issue Date:</strong> <span id="issueDate">...</span></p>
                <p><strong>Expiry Date:</strong> <span id="expiryDate">...</span></p>
            </div>

            <div class="stamp">
                <img src="verified.png">
            </div>
        </div>
    </div>

    <div class="bottom-white-bar">
        <div class="marquee">
            <img src="iso.png"> <img src="osha.png"> <img src="saso.png">
            <img src="sabic.png"> <img src="iosh.png"> <img src="tavtc.png">
            <img src="saac.png"> <img src="anci.png">
            <img src="iso.png"> <img src="osha.png"> <img src="saso.png">
            <img src="sabic.png"> <img src="iosh.png"> <img src="tavtc.png">
        </div>
    </div>

    <script>
        // এখানে আপনার সব ডাটা থাকবে
        const students = {
            "121086": {
                name: "MD MAHIBULLAH",
                course: "SAFETY SPECIALIST / WPR",
                issue: "13-04-2026",
                expiry: "12-04-2027",
                photo: "mahibullah.jpg" 
            },
            "258-KD-SF-26": {
                name: "KAMRUL ISLAM",
                course: "SCAFFOLDING ERECTION AND DISMANTLING",
                issue: "01-02-2026",
                expiry: "31-01-2027",
                photo: "kamrul.jpg"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (id && students[id]) {
            document.getElementById('name').innerText = students[id].name;
            document.getElementById('enrollNo').innerText = id;
            document.getElementById('course').innerText = students[id].course;
            document.getElementById('issueDate').innerText = students[id].issue;
            document.getElementById('expiryDate').innerText = students[id].expiry;
            document.getElementById('userPhoto').src = students[id].photo;
        } else {
            // যদি আইডি না পায়
            document.body.innerHTML = "<h1 style='text-align:center; padding-top:100px;'>আইডি ভুল! লিঙ্ক চেক করুন।</h1>";
        }
    </script>
</body>
</html>
