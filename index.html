<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Verification - Knowledge Drag</title>
    <style>
        /* CSS অংশ: নমুনার মতো ডিজাইনের জন্য */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: #f0f3f6; overflow: hidden;
        }

        /* ওপরের ব্যাকগ্রাউন্ড অংশ */
        .top-section {
            background: url('background.jpg') no-repeat center center;
            background-size: cover;
            height: 82vh; /* স্ক্রিনের ৮২% জায়গা */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* নমুনার মতো সার্টিফিকেট কার্ড */
        .cert-card {
            background: white;
            width: 100%;
            max-width: 480px; /* মোবাইলের জন্য সাইজ */
            padding: 30px;
            border-radius: 4px;
            border-top: 8px solid #005a87; /* ওপরের নীল বর্ডার */
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
        }

        .cert-header { 
            display: flex; align-items: center; gap: 15px; 
            border-bottom: 1px solid #e0e6ed; padding-bottom: 15px; margin-bottom: 20px; 
            text-align: left;
        }
        .cert-header img { width: 50px; }
        .header-text h3 { margin: 0; color: #005a87; font-size: 18px; font-weight: 700; }
        .header-text p { margin: 2px 0 0; font-size: 12px; color: #7f8c8d; }

        .cert-title { 
            color: #005a87; font-size: 20px; text-transform: uppercase; 
            margin: 0 0 20px; font-weight: 700; letter-spacing: 1px;
        }

        .cert-body { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .user-photo img { 
            width: 130px; height: 160px; 
            border: 2px solid #005a87; 
            object-fit: cover; border-radius: 4px; 
        }

        .info-table { width: 100%; text-align: left; margin-bottom: 20px; }
        .info-table p { 
            margin: 8px 0; font-size: 14px; color: #333; 
            border-bottom: 1px solid #f0f3f6; padding-bottom: 4px; 
            display: flex; justify-content: space-between;
        }
        .info-table p strong { color: #555; font-weight: 600; width: 40%; }
        .info-table p span { color: #000; font-weight: 500; width: 60%; text-align: right; }

        .stamp img { width: 90px; margin-top: 10px; opacity: 0.9; }

        /* নিচের সাদা অংশ যেখানে লোগো দৌড়াবে */
        .bottom-marquee {
            height: 18vh; /* স্ক্রিনের নিচের ১৮% জায়গা */
            background: white;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 2px solid #e0e6ed;
        }

        .track {
            display: flex;
            width: calc(150px * 16);
            animation: move 25s linear infinite;
        }

        .track img { width: 100px; margin: 0 30px; height: auto; }

        @keyframes move {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-150px * 8)); }
        }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="cert-card">
            <div class="cert-header">
                <img src="logo.png" alt="Knowledge Drag Logo">
                <div class="header-text">
                    <h3>Knowledge Drag</h3>
                    <p>Safety and Industrial Trainings</p>
                </div>
            </div>

            <h2 class="cert-title">Official Certificate</h2>

            <div class="cert-body">
                <div class="user-photo">
                    <img id="userPhoto" src="logo.png" alt="User Photo">
                </div>

                <div class="info-table">
                    <p><strong>Name:</strong> <span id="name">...</span></p>
                    <p><strong>Enrollment No:</strong> <span id="enrollNo">...</span></p>
                    <p><strong>Course:</strong> <span id="course">...</span></p>
                    <p><strong>Issue Date:</strong> <span id="issueDate">...</span></p>
                    <p><strong>Expiry Date:</strong> <span id="expiryDate">...</span></p>
                </div>
            </div>

            <div class="stamp">
                <img src="verified.png" alt="Verified Seal">
            </div>
        </div>
    </div>

    <div class="bottom-marquee">
        <div class="track">
            <img src="iso.png"> <img src="osha.png"> <img src="saso.png">
            <img src="sabic.png"> <img src="iosh.png"> <img src="tavtc.png">
            <img src="saac.png"> <img src="anci.png">
            <img src="iso.png"> <img src="osha.png"> <img src="saso.png">
            <img src="sabic.png"> <img src="iosh.png"> <img src="tavtc.png">
            <img src="saac.png"> <img src="anci.png">
        </div>
    </div>

    <script>
        // জাভাস্ক্রিপ্ট অংশ: তথ্য ম্যানেজ করার জন্য (আগের মতোই)
        const students = {
            "121086": {
                name: "MD MAHIBULLAH",
                iqama: "258XXXXXXX",
                course: "SAFETY SPECIALIST / WPR",
                issue: "13-04-2026",
                expiry: "12-04-2027",
                photo: "mahibullah.jpg" 
            },
            "258-KD-SF-26": {
                name: "KAMRUL ISLAM",
                iqama: "2589913066",
                course: "SCAFFOLDING ERECTION AND DISMANTLING",
                issue: "01-02-2026",
                expiry: "31-01-2027",
                photo: "kamrul.jpg"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (id && students[id]) {
            document.getElementById('name').innerText = students[id].name;
            document.getElementById('enrollNo').innerText = id;
            document.getElementById('course').innerText = students[id].course;
            document.getElementById('issueDate').innerText = students[id].issue;
            document.getElementById('expiryDate').innerText = students[id].expiry;
            document.getElementById('userPhoto').src = students[id].photo;
        } else {
            document.body.innerHTML = "<div style='background:url(background.jpg); height:100vh; display:flex; justify-content:center; align-items:center;'><h1 style='color:white; text-align:center;'>ID খুঁজে পাওয়া যায়নি! লিঙ্ক চেক করুন।</h1></div>";
        }
    </script>
</body>
</html>
