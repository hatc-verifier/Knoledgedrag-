<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Verification</title>
    <style>
        body { margin: 0; padding: 0; background: #f4f4f4; font-family: Arial, sans-serif; overflow-x: hidden; }

        /* সার্টিফিকেটের মূল অংশ */
        .main-container { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }

        .cert-box {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 1.41 / 1;
            background-image: url('template.png'); /* ব্যাকগ্রাউন্ড ছবি */
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* ডেটা পজিশনিং (শতকরা হিসেবে যাতে মোবাইল ও পিসি-তে এক থাকে) */
        .info { position: absolute; font-weight: bold; color: #111; font-size: 1.6vw; }

        #u_photo { position: absolute; top: 21%; left: 42.5%; width: 15%; height: 23%; object-fit: cover; border: 2px solid #fff; }
        #u_enroll { top: 48.5%; left: 0; width: 100%; text-align: center; color: #005a87; font-size: 1.4vw; }
        #u_name { top: 56%; left: 0; width: 100%; text-align: center; font-size: 3vw; text-transform: uppercase; }

        .details { position: absolute; top: 66%; left: 8%; width: 84%; display: grid; grid-template-columns: 1fr 1fr; gap: 1vw; }
        .row { border-bottom: 1px solid #ccc; padding: 2px 0; display: flex; justify-content: space-between; align-items: flex-end; }
        .lbl { font-size: 1vw; color: #666; font-weight: normal; }
        .val { font-size: 1.3vw; }

        #u_name_small { top: 76.5%; left: 0; width: 100%; text-align: center; font-size: 1.5vw; }

        /* লোগো স্লাইডার (ডান থেকে বামে) */
        .slider-box { width: 100%; background: #fff; padding: 30px 0; margin-top: 50px; border-top: 1px solid #ddd; overflow: hidden; }
        .slider-track { display: flex; width: calc(200px * 14); animation: scroll 20s linear infinite; }
        .slider-track img { height: 50px; margin: 0 40px; filter: grayscale(100%); transition: 0.3s; }
        .slider-track img:hover { filter: grayscale(0%); }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-200px * 7)); }
        }

        /* বড় স্ক্রিনের জন্য সাইজ ফিক্স */
        @media (min-width: 900px) {
            .info, .val { font-size: 14px; }
            #u_name { font-size: 28px; }
            #u_enroll, #u_name_small { font-size: 13px; }
            .lbl { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="cert-box">
        <img id="u_photo" src="" alt="">
        <div id="u_enroll" class="info"></div>
        <div id="u_name" class="info"></div>

        <div class="details">
            <div class="row"><span class="lbl">NAME:</span> <span class="val" id="d_name">---</span></div>
            <div class="row"><span class="lbl">IQAMA/PASSPORT:</span> <span class="val" id="u_iqama">---</span></div>
            <div class="row"><span class="lbl">COURSE:</span> <span class="val" id="u_course">---</span></div>
            <div class="row"><span class="lbl">EXPIRY DATE:</span> <span class="val" id="u_expiry">---</span></div>
            <div class="row"><span class="lbl">ISSUE DATE:</span> <span class="val" id="u_issue">---</span></div>
            <div class="row"><span class="lbl">BRANCH:</span> <span class="val" id="u_branch">---</span></div>
        </div>

        <div id="u_name_small" class="info"></div>
    </div>
</div>

<div class="slider-box">
    <div class="slider-track">
        <img src="iso.png"> <img src="saso.png"> <img src="ansi.png"> <img src="sabic.png"> <img src="oeha.png"> <img src="saac.png"> <img src="iosh.png">
        <img src="iso.png"> <img src="saso.png"> <img src="ansi.png"> <img src="sabic.png"> <img src="oeha.png"> <img src="saac.png"> <img src="iosh.png">
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            if(id && data[id]){
                const s = data[id];
                document.getElementById('u_name').innerText = s.name || "";
                document.getElementById('d_name').innerText = s.name || "";
                document.getElementById('u_name_small').innerText = s.name || "";
                document.getElementById('u_enroll').innerText = "Enrollment No: " + id;
                document.getElementById('u_course').innerText = s.course || "";
                document.getElementById('u_iqama').innerText = s.iqama || "";
                document.getElementById('u_issue').innerText = s.issue || "";
                document.getElementById('u_expiry').innerText = s.expiry || "";
                document.getElementById('u_branch').innerText = s.branch || "Al Jubail, KSA";
                if(s.photo) document.getElementById('u_photo').src = s.photo;
            } else {
                alert("ID not found in data.json!");
            }
        });
</script>

</body>
</html>
