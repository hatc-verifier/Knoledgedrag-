<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Portal - Knowledge Drag</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f4f7f6; overflow-x: hidden; }

        /* ১. ব্যাকগ্রাউন্ড এরিয়া - সম্পূর্ণ ছবি এবং পজিশন */
        .hero-section {
            width: 100%;
            height: 55vh;
            background-color: #f4f7f6;
            background-image: url('background.png'); /* */
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain; 
            position: relative;
            display: flex;
            align-items: center; 
            justify-content: center;
        }

        .cert-container {
            width: 90%;
            max-width: 600px;
            background: white;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 4px;
            z-index: 10;
        }

        .cert-container img { width: 100%; display: block; border-radius: 4px; }

        /* ২. ডাউনলোড বাটন - আপনার দেওয়া স্ক্রিনশট অনুযায়ী */
        .download-btn {
            position: absolute;
            top: 16px; 
            right: 10px; 
            background-color: white; 
            color: #1a4a5a; 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            z-index: 100; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .download-btn i {
            font-size: 20px; 
            font-weight: 700; /* মোটা অ্যারো চিহ্ন */
        }

        @media (max-width: 500px) {
            .download-btn {
                top: 10px; 
                right: 8px; 
                width: 38px;
                height: 38px;
            }
            .download-btn i { font-size: 15px; }
        }

        /* ৩. লোগো স্লাইডার - বড় সাইজ এবং বেশি সাদা অংশ */
        .slider-box {
            width: 100%;
            background: white;
            padding: 108px 0; /* সাদা অংশ বড় করা হলো */
            overflow: hidden;
            border-bottom: 2px solid #ddd;
            margin-top: -35px;
        }

        .track {
            display: flex;
            width: calc(300px * 24); 
            animation: scroll 30s linear infinite;
        }

        .track img { 
            width: 180px; /* লোগোর সাইজ বড় করা হয়েছে */
            height: 110px;
            margin: 0 70px; 
            object-fit: contain; 
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-300px * 8)); } /* স্মুথ লুপের জন্য */
        }

        /* ৪. তথ্য সেকশন - নীল ফুটার */
        .info-footer { background-color: #1a4a5a; color: white; padding: 50px 20px; }
        .footer-content { max-width: 800px; margin: auto; }
        .branch-list h3, .contact-info h3 { color: #a5d6e7; margin-bottom: 15px; font-size: 20px; }
        .item { margin-bottom: 10px; font-size: 16px; opacity: 0.9; display: flex; align-items: center; }
        .item i { margin-right: 12px; width: 20px; text-align: center; }
        .copyright { text-align: center; font-size: 13px; margin-top: 40px; opacity: 0.6; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="cert-container">
            <a href="" id="download-link" download class="download-btn">
                <i class="fas fa-arrow-down"></i>
            </a>
            <img id="main-cert" src="" alt="Certificate">
        </div>
    </div>

    <div class="slider-box">
        <div class="track">
            <img src="iso.png"> <img src="saso.png"> <img src="ansi.png"> 
            <img src="sabic.png"> <img src="osha.png"> <img src="aramco.png">
            <img src="iosh.png"> <img src="tavto.png">
            <img src="iso.png"> <img src="saso.png"> <img src="ansi.png"> 
            <img src="sabic.png"> <img src="osha.png"> <img src="aramco.png">
            <img src="iosh.png"> <img src="tavto.png">
        </div>
    </div>

    <div class="info-footer">
        <div class="footer-content">
            <h2 style="margin-bottom: 20px; font-size: 28px; border-left: 5px solid #a5d6e7; padding-left: 15px;">Knowledge Drag</h2>
            <p style="margin-bottom: 30px; font-size: 17px; line-height: 1.6;">Leadership in Occupational Safety and Certified Trainings.</p>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px;">
                <div class="branch-list">
                    <h3>Our Branches</h3>
                    <div class="item"><i class="fas fa-map-marker-alt"></i> Al-Thuqbah & Al Jubail</div>
                    <div class="item"><i class="fas fa-map-marker-alt"></i> Yanbu & Riyadh</div>
                </div>

                <div class="contact-info">
                    <h3>Get in Touch</h3>
                    <div class="item"><i class="fas fa-phone-alt"></i> +966542004373</div>
                    <div class="item"><i class="fas fa-envelope"></i> info@knowledgedrag.sa</div>
                    <div class="item"><i class="fab fa-whatsapp"></i> WhatsApp Support</div>
                </div>
            </div>
            <div class="copyright">© 2025 Knowledge Drag. All rights reserved.</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('id');
        const certImg = document.getElementById('main-cert');
        const dlLink = document.getElementById('download-link');

        if (certId) {
            // আপনার certificates ফোল্ডার থেকে ছবি লোড করবে
            const imagePath = "certificates/" + certId + ".png";
            certImg.src = imagePath;
            dlLink.href = imagePath;
        } else {
            document.querySelector('.cert-container').innerHTML = "<h2 style='text-align:center; padding: 20px;'>Please provide a valid Certificate ID</h2>";
        }

        certImg.onerror = function() {
            this.src = "template.png"; /* ছবি না থাকলে টেম্পলেট দেখাবে */
            dlLink.style.display = "none";
        };
    </script>
</body>
</html>
