<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification System</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Arial', sans-serif; overflow: hidden; }

        /* ব্যাকগ্রাউন্ড অংশ */
        .main-container {
            background: url('background.jpg') no-repeat center center;
            background-size: cover;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        /* নমুনার মতো হুবহু কার্ড */
        .cert-card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 5px;
            border-top: 10px solid #005a87;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            padding: 20px;
            text-align: center;
        }

        .header { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; text-align: left; }
        .header img { width: 45px; }
        .header-text h3 { margin: 0; color: #005a87; font-size: 16px; }
        .header-text p { margin: 0; font-size: 10px; color: #777; }

        .title { color: #005a87; font-size: 18px; text-transform: uppercase; margin: 10px 0; font-weight: bold; }

        .photo-area img { width: 110px; height: 130px; border: 2px solid #005a87; object-fit: cover; margin-bottom: 15px; }

        .info-grid { text-align: left; margin-bottom: 15px; }
        .info-grid p { margin: 5px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5; padding-bottom: 3px; display: flex; justify-content: space-between; }
        .info-grid strong { color: #444; width: 40%; }
        .info-grid span { color: #000; font-weight: bold; width: 60%; text-align: right; }

        .stamp img { width: 80px; }

        /* লোগো স্লাইডার (সাদা অংশ) */
        .footer-marquee {
            height: 20vh;
            background: white;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-top: 2px solid #ddd;
        }

        .marquee-track { display: flex; width: 2000px; animation: moveLogos 20s linear infinite; }
        .marquee-track img { width: 80px; margin: 0 30px; }

        @keyframes moveLogos {
            0% { transform: translateX(0); }
            100% { transform: translateX(-1000px); }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="cert-card">
            <div class="header">
                <img src="logo.png">
                <div class="header-text">
                    <h3>Knowledge Drag</h3>
                    <p>Safety and Industrial Trainings</p>
                </div>
            </div>

            <h2 class="title">Official Certificate</h2>

            <div class="photo-area">
                <img id="userPhoto" src="logo.png">
            </div>

            <div class="info-grid">
                <p><strong>Name:</strong> <span id="name">...</span></p>
                <p><strong>Enrollment:</strong> <span id="enrollNo">...</span></p>
                <p><strong>Course:</strong> <span id="course">...</span></p>
                <p><strong>Issue Date:</strong> <span id="issueDate">...</span></p>
                <p><strong>Expiry Date:</strong> <span id="expiryDate">...</span></p>
            </div>

            <div class="stamp">
                <img src="verified.png">
            </div>
        </div>
    </div>

    <div class="footer-marquee">
        <div class="marquee-track">
            <img src="iso.png"> <img src="osha.png"> <img src="saso.png">
            <img src="sabic.png"> <img src="iosh.png"> <img src="tavtc.png">
            <img src="saac.png"> <img src="anci.png">
            <img src="iso.png"> <img src="osha.png"> <img src="saso.png">
            <img src="sabic.png"> <img src="iosh.png"> <img src="tavtc.png">
        </div>
    </div>

    <script>
        // JSON ফাইল থেকে ডাটা পড়ার সিস্টেম
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                if (id && data[id]) {
                    const student = data[id];
                    document.getElementById('name').innerText = student.name;
                    document.getElementById('enrollNo').innerText = id;
                    document.getElementById('course').innerText = student.course;
                    document.getElementById('issueDate').innerText = student.issue;
                    document.getElementById('expiryDate').innerText = student.expiry;
                    document.getElementById('userPhoto').src = student.photo;
                } else {
                    document.body.innerHTML = "<h2 style='text-align:center; padding-top:50px;'>Invalid ID!</h2>";
                }
            })
            .catch(err => console.error("Data load error:", err));
    </script>
</body>
</html>
