<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Verification - Knowledge Drag</title>
    <style>
        /* ১. বেসিক সেটআপ ও ব্যাকগ্রাউন্ড */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 200vh; /* স্ক্রলিং রাখার জন্য */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ২. টপ হেডার (রেফারেন্স সাইটের মত) */
        header {
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-text { color: white; font-weight: bold; font-size: 1.2rem; }

        /* ৩. মেইন কন্টেইনার (সার্টিফিকেট এরিয়া) */
        .main-content {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        /* ৪. সার্টিফিকেট সাইজ (মোবাইলে ৩০% জায়গা নিবে) */
        .cert-display {
            width: 90%; /* মোবাইলে দুইপাশে একটু জায়গা থাকবে */
            max-width: 800px;
            background: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
            transition: 0.3s;
        }

        /* আপনার শর্ত অনুযায়ী মোবাইলে হাইট কন্ট্রোল */
        @media (max-width: 600px) {
            .cert-display {
                width: 85%;
                height: 30vh; /* মোবাইলের মাত্র ৩০% জায়গা জুড়ে দেখাবে */
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .cert-display img {
                max-height: 100%;
                width: auto;
            }
        }

        .cert-display img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ৫. লোগো স্লাইডার (রঙিন ও এনিমেটেড) */
        .slider-box {
            width: 100%;
            background: white;
            padding: 40px 0;
            margin-top: 50px;
            overflow: hidden;
            border-top: 4px solid #005a87;
        }

        .slider-track {
            display: flex;
            width: calc(150px * 16);
            animation: scroll 20s linear infinite;
        }

        .slider-track img {
            width: 100px;
            margin: 0 30px;
            object-fit: contain;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-150px * 8)); }
        }

        /* ৬. নিচের কন্টেন্ট (স্ক্রল করলে যা দেখাবে) */
        .extra-content {
            width: 100%;
            max-width: 900px;
            padding: 50px 20px;
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">Knowledge Drag</div>
        <div style="color:white">☰</div>
    </header>

    <div class="main-content">
        <div class="cert-display" id="cert-container">
            <img id="main-cert" src="" alt="Loading Certificate...">
        </div>
    </div>

    <div class="slider-box">
        <div class="slider-track">
            <img src="iso.png"> <img src="saso.png"> <img src="ansi.png"> <img src="sabic.png"> 
            <img src="oeha.png"> <img src="saac.png"> <img src="iosh.png"> <img src="tavto.png">
            <img src="iso.png"> <img src="saso.png"> <img src="ansi.png"> <img src="sabic.png"> 
            <img src="oeha.png"> <img src="saac.png"> <img src="iosh.png"> <img src="tavto.png">
        </div>
    </div>

    <div class="extra-content">
        <h2>Industrial Safety & Technical Training</h2>
        <p style="margin-top:20px;">We are committed to providing the highest standard of safety training in Saudi Arabia. Our certificates are globally recognized and verified.</p>
    </div>

    <script>
        // ইউআরএল থেকে আইডি বের করার ফাংশন
        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('id');
        const certImg = document.getElementById('main-cert');

        if (certId) {
            // যদি আইডি থাকে, তবে সেই নামের ছবি লোড হবে (ধরে নিচ্ছি ছবিগুলো .png ফরম্যাটে)
            certImg.src = "certificates/" + certId + ".png"; 
        } else {
            // আইডি না থাকলে একটি ডিফল্ট মেসেজ
            document.getElementById('cert-container').innerHTML = "<h2 style='padding:20px'>Please provide a valid Certificate ID</h2>";
        }

        // ছবি লোড হতে ভুল হলে এরর হ্যান্ডলিং
        certImg.onerror = function() {
            document.getElementById('cert-container').innerHTML = "<h2 style='padding:20px; color:red;'>Certificate Not Found (ID: " + certId + ")</h2>";
        };
    </script>
</body>
</html>
