<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Portal - Knowledge Drag</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f4f7f6; overflow-x: hidden; }

        /* ১. ব্যাকগ্রাউন্ড এরিয়া - আপনার চাওয়া অনুযায়ী সম্পূর্ণ ছবি সেট করা হয়েছে */
        .hero-section {
            width: 100%;
            height: 55vh; /* মোবাইলের ৫৫% */
            background-color: #f4f7f6; /* ছবির পেছনের খালি অংশের রঙ */
            
            /* আপনার ফাইল অনুযায়ী correct background file name ব্যবহার করুন (e.g., .png or .jpeg) */
            background-image: url('background.png'); 
            
            background-repeat: no-repeat;
            background-position: center;
            
            /* 'contain' ব্যবহার করায় সম্পূর্ণ ছবি দেখা যাবে, কিন্তু ছবির আকৃতি অনুযায়ী পেজের ৫৫% এরিয়ার ভেতরে ওপরে/নিচে খালি জায়গা থাকতে পারে। */
            background-size: contain; 

            position: relative;
            display: flex;
            align-items: center; 
            justify-content: center;
        }

        .cert-container {
            width: 90%;
            max-width: 600px;
            background: white;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
            z-index: 10;
        }

        .cert-container img { width: 100%; display: block; }

                /* আপনার দেওয়া স্ক্রিনশট অনুযায়ী ডাউনলোড বাটন */
        .download-btn {
            position: absolute;
            top: 20px; /* সার্টিফিকেটের টপ থেকে ২০ পিক্সেল নিচে */
            right: -25px; /* সার্টিফিকেটের ডান কিনারা থেকে বাইরে ভেসে থাকবে */
            background-color: white; /* সাদা বৃত্তাকার ব্যাকগ্রাউন্ড */
            color: #1a4a5a; /* আইকনের রঙ আপনার দেওয়া নীল */
            width: 50px; /* বৃত্তের সাইজ */
            height: 50px; /* বৃত্তের সাইজ */
            border-radius: 50%; /* বৃত্তাকার করার জন্য */
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 24px; /* আইকনের সাইজ */
            z-index: 30; /* সার্টিফিকেটের ওপরে থাকবে */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* হালকা শ্যাডো */
            transition: 0.3s;
        }

        /* মোবাইলের জন্য বাটনটি যাতে স্ক্রিনের বাইরে না যায় */
        @media (max-width: 600px) {
            .download-btn {
                right: 10px; /* মোবাইলে কোণায় থাকবে */
                top: 10px;
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }

        .download-btn:hover {
            transform: scale(1.05); /* মাউস নিলে একটু বড় হবে */
        }


        .download-btn:hover { opacity: 1; color: #fff; }

        /* ৩. লোগো স্লাইডার */
        .slider-box {
            width: 100%;
            background: white;
            padding: 50px 0;
            overflow: hidden;
            border-bottom: 2px solid #ddd;
        }

        .track {
            display: flex;
            width: calc(180px * 16);
            animation: scroll 25s linear infinite;
        }

        .track img { 
            width: 120px; 
            height: 70px;
            margin: 0 40px; 
            object-fit: contain; 
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-180px * 8)); }
        }

        /* ৪. তথ্য সেকশন */
        .info-footer { background-color: #1a4a5a; color: white; padding: 50px 20px; }
        .footer-content { max-width: 800px; margin: auto; }
        .branch-list h3, .contact-info h3 { color: #a5d6e7; margin-bottom: 15px; font-size: 20px; }
        .item { margin-bottom: 10px; font-size: 16px; opacity: 0.9; display: flex; align-items: center; }
        .item i { margin-right: 12px; }
        .copyright { text-align: center; font-size: 13px; margin-top: 40px; opacity: 0.6; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="cert-container">
            <a href="" id="download-link" download class="download-btn">
                <i class="fas fa-download"></i>
            </a>
            <img id="main-cert" src="" alt="Certificate">
        </div>
    </div>

    <div class="slider-box">
        <div class="track">
            <img src="iso.png"> <img src="saso.png"> <img src="ansi.png"> 
            <img src="sabic.png"> <img src="osha.png"> <img src="aramco.png">
            <img src="iosh.png"> <img src="tavto.png">
            <img src="iso.png"> <img src="saso.png"> <img src="ansi.png"> 
            <img src="sabic.png"> <img src="osha.png"> <img src="aramco.png">
            <img src="iosh.png"> <img src="tavto.png">
        </div>
    </div>

    <div class="info-footer">
        <div class="footer-content">
            <h2 style="margin-bottom: 20px; font-size: 28px; border-left: 5px solid #a5d6e7; padding-left: 15px;">Knowledge Drag</h2>
            <p style="margin-bottom: 30px; font-size: 17px; line-height: 1.6;">Leadership in Occupational Safety and Certified Trainings.</p>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px;">
                <div class="branch-list">
                    <h3>Our Branches</h3>
                    <div class="item"><i class="fas fa-map-marker-alt"></i> Al-Thuqbah & Al Jubail</div>
                    <div class="item"><i class="fas fa-map-marker-alt"></i> Yanbu & Riyadh</div>
                </div>

                <div class="contact-info">
                    <h3>Get in Touch</h3>
                    <div class="item"><i class="fas fa-phone-alt"></i> +966542004373</div>
                    <div class="item"><i class="fas fa-envelope"></i> info@knowledgedrag.sa</div>
                </div>
            </div>
            
            <div class="copyright">© 2025 Knowledge Drag. All rights reserved.</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('id');
        const certImg = document.getElementById('main-cert');
        const dlLink = document.getElementById('download-link');

        if (certId) {
            const imagePath = "certificates/" + certId + ".png";
            certImg.src = imagePath;
            dlLink.href = imagePath;
        } else {
            // আইডি না থাকলে সার্টিফিকেটের জায়গায় এই মেসেজ দেখাবে।
            document.querySelector('.cert-container').innerHTML = "<h2 style='text-align:center; padding: 20px;'>Please provide a valid Certificate ID</h2>";
        }

        certImg.onerror = function() {
            // ছবি লোড না হলে, আপনার মেইন রিপোজিটরিতে থাকা template.png ছবিটি দেখাবে।
            this.src = "template.png"; 
            dlLink.style.display = "none";
        };
    </script>
</body>
</html>
