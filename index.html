<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Portal - Knowledge Drag</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f4f7f6; }

        /* ১. ব্যাকগ্রাউন্ড ঠিক করা হলো (আপনার ফাইল অনুযায়ী .png) */
        .hero-section {
            width: 100%;
            height: 55vh;
            background: url('background.png') no-repeat center center; /* */
            background-size: cover;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cert-container {
            width: 90%;
            max-width: 600px;
            background: white;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        .cert-container img { width: 100%; display: block; }

        .download-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #005a87;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 20px;
            z-index: 20;
        }

        /* ২. লোগো স্লাইডার (আপনার ফাইলের নাম অনুযায়ী) */
        .slider-box {
            width: 100%;
            background: white;
            padding: 20px 0;
            overflow: hidden;
            border-bottom: 2px solid #ddd;
        }

        .track {
            display: flex;
            width: calc(120px * 20);
            animation: scroll 25s linear infinite;
        }

        .track img { width: 80px; margin: 0 20px; object-fit: contain; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-120px * 10)); }
        }

        /* ৩. তথ্য সেকশন */
        .info-footer { background-color: #1a4a5a; color: white; padding: 40px 20px; }
        .branch-list h3, .contact-info h3 { color: #a5d6e7; margin-bottom: 10px; }
        .item { margin-bottom: 8px; font-size: 15px; opacity: 0.9; }
        .copyright { text-align: center; font-size: 12px; margin-top: 30px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="cert-container">
            <a href="" id="download-link" download class="download-btn">
                <i class="fas fa-download"></i>
            </a>
            <img id="main-cert" src="" alt="Certificate">
        </div>
    </div>

    <div class="slider-box">
        <div class="track">
            <img src="iso.png"> <img src="saso.png"> <img src="ansi.png"> 
            <img src="sabic.png"> <img src="osha.png"> <img src="aramco.png">
            <img src="iosh.png"> <img src="tavto.png"> <img src="verified.png">
            <img src="iso.png"> <img src="saso.png"> <img src="ansi.png"> 
            <img src="sabic.png"> <img src="osha.png"> <img src="aramco.png">
            <img src="iosh.png"> <img src="tavto.png"> <img src="verified.png">
        </div>
    </div>

    <div class="info-footer">
        <div style="max-width: 600px; margin: auto;">
            <h2 style="margin-bottom: 15px;">Knowledge Drag</h2>
            <p style="margin-bottom: 25px;">Leadership in Occupational Safety and Certified Trainings.</p>

            <div class="branch-list">
                <h3>Our Branches</h3>
                <div class="item">Al-Thuqbah, Khobar KSA / Al Jubail, KSA</div>
                <div class="item">Yanbu, KSA / Riyadh, KSA</div>
            </div>

            <div class="contact-info" style="margin-top: 20px;">
                <h3>Get in Touch</h3>
                <div class="item"><i class="fas fa-phone"></i> +966542004373</div>
                <div class="item"><i class="fas fa-envelope"></i> info@knowledgedrag.sa</div>
            </div>
            <div class="copyright">© 2025 Knowledge Drag all right reserved.</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const certId = urlParams.get('id');
        const certImg = document.getElementById('main-cert');
        const dlLink = document.getElementById('download-link');

        if (certId) {
            // আপনার certificates ফোল্ডারের ভেতরে ছবি খুঁজবে
            const imagePath = "certificates/" + certId + ".png";
            certImg.src = imagePath;
            dlLink.href = imagePath;
        } else {
            document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>No ID Provided</h2>";
        }

        certImg.onerror = function() {
            this.src = "template.png"; // ছবি না পেলে টেম্পলেট দেখাবে
        };
    </script>
</body>
</html>
